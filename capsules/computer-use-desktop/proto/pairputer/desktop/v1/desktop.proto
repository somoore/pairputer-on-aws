syntax = "proto3";

package pairputer.desktop.v1;

service DesktopAgent {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (Capabilities);
  rpc Observe(ObserveRequest) returns (DesktopSnapshot);
  rpc Execute(ExecuteRequest) returns (ActionResult);
  rpc SubmitTask(SubmitTaskRequest) returns (TaskHandle);
  rpc ContinueTask(ContinueTaskRequest) returns (TaskHandle);
  rpc GetTask(GetTaskRequest) returns (TaskStatus);
  rpc CancelTask(CancelTaskRequest) returns (TaskStatus);
  rpc WatchEvents(WatchEventsRequest) returns (stream TaskEvent);
}

message GetCapabilitiesRequest {}

message DisplayMetadata {
  uint64 display_revision = 1;
  uint32 logical_width = 2;
  uint32 logical_height = 3;
  uint32 encoded_width = 4;
  uint32 encoded_height = 5;
  double device_scale = 6;
  uint32 rotation = 7;
  string observed_at = 8;
}

message Capabilities {
  string protocol_version = 1;
  string service_version = 2;
  DisplayMetadata display = 3;
  repeated string observers = 4;
  repeated string effectors = 5;
  repeated string installed_apps = 6;
  repeated string supported_actions = 7;
  repeated string presentation_modes = 8;
  repeated string risk_classes = 9;
  map<string, uint64> limits = 10;
  bool browser_cdp_ready = 11;
  bool accessibility_ready = 12;
}

message ObserveRequest {
  bool include_windows = 1;
  bool include_browser = 2;
  bool include_accessibility = 3;
  string accessibility_app = 4;
  string workspace_path = 5;
  uint32 limit = 6;
  string task_id = 7;
}

message DesktopSnapshot {
  uint64 world_revision = 1;
  uint64 human_epoch = 2;
  string observed_at = 3;
  DisplayMetadata display = 4;
  string control_owner = 5;
  string active_window_json = 6;
  string windows_json = 7;
  string accessibility_json = 8;
  string browser_tabs_json = 9;
  string workspace_json = 10;
  string running_jobs_json = 11;
  repeated string truncation_notices = 12;
}

message ActionEnvelope {
  string task_id = 1;
  string step_id = 2;
  string action_id = 3;
  uint64 expected_world_revision = 4;
  uint64 expected_human_epoch = 5;
  string idempotency_key = 6;
  string presentation_mode = 7;
  uint64 deadline_unix_ms = 8;
}

message WorkspaceListAction { string path = 1; uint32 limit = 2; }
message WorkspaceDescribeAction { string path = 1; }
message WorkspaceReadAction { string path = 1; uint64 offset = 2; uint64 length = 3; }
message WorkspaceWriteAction {
  string path = 1; string content = 2; string encoding = 3; string expected_sha256 = 4;
}
message WorkspaceMkdirAction { string path = 1; optional bool parents = 2; }
message WorkspaceUploadAction {
  string path = 1; string upload_id = 2; uint64 offset = 3; string chunk_base64 = 4;
  string chunk_sha256 = 5; uint64 total_size = 6; string total_sha256 = 7;
  bool final = 8; string expected_sha256 = 9;
}
message PatchHunk { string old = 1; string new = 2; uint32 count = 3; }
message WorkspacePatchAction { string path = 1; string expected_sha256 = 2; repeated PatchHunk hunks = 3; }
message WorkspaceMoveAction { string source = 1; string destination = 2; string expected_sha256 = 3; }
message WorkspaceTrashAction { string path = 1; string expected_sha256 = 2; }
message ProcessStartAction {
  repeated string argv = 1; string shell = 2; bool explicit_shell_mode = 3; string cwd = 4;
  map<string,string> environment = 5; string takeover_policy = 6;
}
message ProcessStatusAction { string job_id = 1; uint32 tail_bytes = 2; }
message ProcessCancelAction { string job_id = 1; }
message AppOpenAction { string app_id = 1; }
message WindowListAction {}
message WindowFocusAction { string window_id = 1; }
message BrowserOpenAction { string url = 1; }
message BrowserObserveAction {}
message BrowserAction {
  string tab_id = 1; string browser_action = 2; string url = 3; string selector = 4; string value = 5;
}
message AccessibilityTreeAction { string app_name = 1; string role = 2; string name = 3; }
message AccessibilityAction { string app_name = 1; string role = 2; string name = 3; string operation = 4; }
message ScreenshotAction { uint32 x = 1; uint32 y = 2; uint32 width = 3; uint32 height = 4; }
message ArtifactExportAction { string path = 1; string expected_sha256 = 2; }
message TaskDomainGrantAction { string task_id = 1; repeated string allowed_domains = 2; }
message TaskDomainRevokeAction { string task_id = 1; }
message TaskDomainClearAction {}

message DesktopAction {
  oneof action {
    WorkspaceListAction workspace_list = 1;
    WorkspaceDescribeAction workspace_describe = 2;
    WorkspaceReadAction workspace_read = 3;
    WorkspaceWriteAction workspace_write = 4;
    WorkspacePatchAction workspace_patch = 5;
    WorkspaceMoveAction workspace_move = 6;
    WorkspaceTrashAction workspace_trash = 7;
    ProcessStartAction process_start = 8;
    ProcessStatusAction process_status = 9;
    ProcessCancelAction process_cancel = 10;
    AppOpenAction app_open = 11;
    WindowListAction window_list = 12;
    WindowFocusAction window_focus = 13;
    BrowserOpenAction browser_open = 14;
    BrowserObserveAction browser_observe = 15;
    BrowserAction browser_action = 16;
    AccessibilityTreeAction accessibility_tree = 17;
    AccessibilityAction accessibility_action = 18;
    ScreenshotAction screenshot = 19;
    ArtifactExportAction artifact_export = 20;
    TaskDomainGrantAction task_domain_grant = 21;
    TaskDomainRevokeAction task_domain_revoke = 22;
    TaskDomainClearAction task_domain_clear = 23;
    WorkspaceUploadAction workspace_upload = 24;
    WorkspaceMkdirAction workspace_mkdir = 25;
  }
}

message ExecuteRequest { ActionEnvelope envelope = 1; DesktopAction action = 2; }

message ActionResult {
  bool accepted = 1;
  string reason = 2;
  string action_id = 3;
  uint64 starting_world_revision = 4;
  uint64 ending_world_revision = 5;
  uint64 human_epoch = 6;
  string actuator = 7;
  string presentation_method = 8;
  string summary = 9;
  string data_json = 10;
  string postconditions_json = 11;
  string evidence_json = 12;
  string retry_safety = 13;
  repeated string warnings = 14;
}

message SubmitTaskRequest { string goal = 1; string contract_json = 2; }
message ContinueTaskRequest { string task_id = 1; string continuation_json = 2; }
message GetTaskRequest { string task_id = 1; }
message CancelTaskRequest { string task_id = 1; }
message WatchEventsRequest { string task_id = 1; uint64 after_sequence = 2; }
message TaskHandle { string task_id = 1; string state = 2; }
message TaskStatus { string task_id = 1; string state = 2; string status_json = 3; }
message TaskEvent { uint64 sequence = 1; string task_id = 2; string type = 3; string payload_json = 4; }
