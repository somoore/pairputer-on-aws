AWSTemplateFormatVersion: "2010-09-09"

Description: pairputer DOOM Lambda MicroVM image build stack.

Parameters:
  DoomCodeArtifactUri:
    Type: String
    Description: S3 URI for the WAD-free DOOM MicroVM build context zip.
    AllowedPattern: '^s3://[^\s]+$'
  DoomCodeArtifactBucket:
    Type: String
    Description: S3 bucket containing DoomCodeArtifactUri.
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
  DoomImageName:
    Type: String
    Default: hellbox-doom
    Description: Account-local Lambda MicroVM image name.
    AllowedPattern: '^[a-zA-Z0-9-_]{1,64}$'
  DoomBaseImageArn:
    Type: String
    Default: ""
    Description: Optional managed base image ARN. Leave empty for the regional al2023-1 base image.
    AllowedPattern: '^$|^arn:aws[a-zA-Z-]*:lambda:[a-z0-9-]+:aws:microvm-image:[a-zA-Z0-9-_]+$'
  DoomBaseImageVersion:
    Type: String
    Default: "0"
    Description: Managed base image version used by AWS::Lambda::MicrovmImage.
    AllowedPattern: '^[^\s]+$'
  DoomImageMinimumMemoryMiB:
    Type: Number
    Default: 2048
    MinValue: 2048
    MaxValue: 32768
    Description: Minimum memory for each DOOM MicroVM.
  PairputerDebug:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Bake PAIRPUTER_DEBUG into the image so the capsule emits verbose input diagnostics.
  InputSelftestEnforce:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: When true, a failed input self-test fails the image build instead of shipping a capsule where input does not work.

Conditions:
  UseDefaultBaseImageArn: !Equals [!Ref DoomBaseImageArn, ""]

Resources:
  MicrovmImageLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/microvms/${AWS::StackName}/${DoomImageName}"
      RetentionInDays: 14

  MicrovmImageBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: PairputerMicrovmImageBuild
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadBuildContext
                Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::${DoomCodeArtifactBucket}/*"
              - Sid: WriteBuildLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${MicrovmImageLogGroup.Arn}:*"
              - Sid: DescribeLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"

  DoomMicrovmImage:
    Type: AWS::Lambda::MicrovmImage
    Properties:
      Name: !Ref DoomImageName
      Description: pairputer DOOM MicroVM image built from a WAD-free context.
      BaseImageArn: !If
        - UseDefaultBaseImageArn
        - !Sub "arn:aws:lambda:${AWS::Region}:aws:microvm-image:al2023-1"
        - !Ref DoomBaseImageArn
      BaseImageVersion: !Ref DoomBaseImageVersion
      BuildRoleArn: !GetAtt MicrovmImageBuildRole.Arn
      CodeArtifact:
        Uri: !Ref DoomCodeArtifactUri
      AdditionalOsCapabilities:
        - ALL
      CpuConfigurations:
        - Architecture: ARM_64
      EgressNetworkConnectors:
        - !Sub "arn:aws:lambda:${AWS::Region}:aws:network-connector:aws-network-connector:INTERNET_EGRESS"
      EnvironmentVariables:
        - Key: PAIRPUTER_CAPSULE
          Value: doom
        - Key: PAIRPUTER_DEBUG
          Value: !Ref PairputerDebug
        - Key: PAIRPUTER_INPUT_SELFTEST_ENFORCE
          Value: !Ref InputSelftestEnforce
      Hooks:
        Port: 9000
        MicrovmImageHooks:
          Ready: ENABLED
          # 600s starved the workbench once its image crossed ~5.1GB: a converted MicroVM image has
          # substantially colder first-touch I/O than local Docker (boot is a lazy-load page-fault
          # storm — Xvnc sat in wchan=folio_wait_bit_common), and the brew-baked build missed the
          # 10-minute ready hook twice while every smaller rollback build passed. The budget is a
          # ceiling, not a delay: a fast boot still completes in ~1 minute.
          ReadyTimeoutInSeconds: 1800
          Validate: DISABLED
          ValidateTimeoutInSeconds: 60
        MicrovmHooks:
          Run: ENABLED
          RunTimeoutInSeconds: 60
          Resume: ENABLED
          ResumeTimeoutInSeconds: 60
          Suspend: DISABLED
          SuspendTimeoutInSeconds: 60
          Terminate: DISABLED
          TerminateTimeoutInSeconds: 60
      Logging:
        CloudWatch:
          LogGroup: !Ref MicrovmImageLogGroup
      Resources:
        - MinimumMemoryInMiB: !Ref DoomImageMinimumMemoryMiB
      Tags:
        - Key: Project
          Value: pairputer
        - Key: Component
          Value: DoomMicrovmImage

  # --- Foolproof teardown: terminate MicroVMs before the image is deleted ---------------------------
  # A running/suspended MicroVM pins its image, so `DeleteMicrovmImage` fails with an opaque
  # GeneralServiceException and the whole stack delete gets stuck. This custom resource terminates every
  # MicroVM on the image on stack DELETE, waits for TERMINATED, THEN lets CloudFormation delete the image.
  # It DependsOn the image so, on delete, the reaper runs FIRST (CFN deletes in reverse dependency order).
  MicrovmReaperRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PairputerMicrovmReaper
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*"
              # List + terminate MicroVMs on THIS image, and delete the image itself, scoped to this
              # account's microvm-image ARN. DeleteMicrovmImage lets the reaper delete the image (with
              # retries on the transient GeneralServiceException) BEFORE CloudFormation's native delete —
              # so a console-only user, who never runs remove-cf.sh, gets an unstuck teardown too.
              - Effect: Allow
                Action:
                  - lambda:ListMicrovms
                  - lambda:TerminateMicrovm
                  - lambda:GetMicrovm
                  - lambda:DeleteMicrovmImage
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:microvm-image:${DoomImageName}"

  MicrovmReaperFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt MicrovmReaperRole.Arn
      Timeout: 300
      Environment:
        Variables:
          IMAGE_ARN: !GetAtt DoomMicrovmImage.ImageArn
      Code:
        ZipFile: |
          import json, time, urllib.request, boto3
          from botocore.exceptions import ClientError
          def _send(e, ctx, status, reason):
              body = json.dumps({"Status": status, "Reason": reason[:1000],
                  "PhysicalResourceId": e.get("PhysicalResourceId", "pairputer-microvm-reaper"),
                  "StackId": e["StackId"], "RequestId": e["RequestId"],
                  "LogicalResourceId": e["LogicalResourceId"], "Data": {}}).encode()
              req = urllib.request.Request(e["ResponseURL"], data=body, method="PUT",
                  headers={"content-type": "", "content-length": str(len(body))})
              urllib.request.urlopen(req, timeout=30)
          def handler(event, context):
              try:
                  # Only Delete needs reaping; Create/Update are no-ops that must still signal SUCCESS.
                  if event["RequestType"] != "Delete":
                      return _send(event, context, "SUCCESS", "no-op")
                  import os
                  arn = os.environ["IMAGE_ARN"]
                  c = boto3.client("lambda-microvms")
                  # terminate every non-terminated MicroVM on this image
                  vms = c.list_microvms(imageIdentifier=arn).get("items", [])
                  for vm in vms:
                      if vm.get("state") != "TERMINATED":
                          try: c.terminate_microvm(microvmIdentifier=vm["microvmId"])
                          except Exception as ex: print("terminate", vm.get("microvmId"), ex)
                  # wait until all are TERMINATED (image delete is blocked until then)
                  for _ in range(40):
                      left = [v for v in c.list_microvms(imageIdentifier=arn).get("items", [])
                              if v.get("state") != "TERMINATED"]
                      if not left: break
                      if context.get_remaining_time_in_millis() < 60000: break
                      time.sleep(6)
                  # Delete the image HERE, with retries, so it's already gone before CloudFormation's own
                  # native DeleteMicrovmImage runs (which does NOT retry the transient GeneralServiceException
                  # that flakes even with no VM pinning the image). CFN then no-ops on the already-deleted
                  # image. This is what unsticks teardown for a CONSOLE user who never runs remove-cf.sh.
                  deleted = False
                  for _ in range(6):
                      if context.get_remaining_time_in_millis() < 25000: break
                      try:
                          c.delete_microvm_image(imageIdentifier=arn)
                          deleted = True
                          break
                      except ClientError as de:
                          if de.response.get("Error", {}).get("Code", "") in ("ResourceNotFoundException", "NotFoundException"):
                              deleted = True  # already gone
                              break
                          print("delete_microvm_image retry:", de)
                          time.sleep(8)
                      except Exception as de:
                          print("delete_microvm_image retry:", de)
                          time.sleep(8)
                  _send(event, context, "SUCCESS",
                        f"reaped MicroVMs and {'deleted' if deleted else 'best-effort (CFN will retry)'} image {arn}")
              except Exception as exc:
                  # Never block teardown on the reaper — SUCCESS so the stack delete proceeds. If a VM
                  # genuinely lingers, the image delete surfaces it, but that's rare vs. the common case.
                  print("reaper error:", exc)
                  try: _send(event, context, "SUCCESS", f"reaper best-effort (error: {exc})")
                  except Exception as se: print("send failed:", se)

  MicrovmReaper:
    Type: Custom::PairputerMicrovmReaper
    # DependsOn the image => on stack DELETE this runs BEFORE the image is deleted (reverse order),
    # terminating the MicroVMs that would otherwise block DeleteMicrovmImage.
    DependsOn: DoomMicrovmImage
    Properties:
      ServiceToken: !GetAtt MicrovmReaperFunction.Arn
      ImageArn: !GetAtt DoomMicrovmImage.ImageArn

Outputs:
  DoomImageArn:
    Description: ARN of the generated pairputer DOOM MicroVM image.
    Value: !GetAtt DoomMicrovmImage.ImageArn
  DoomImageState:
    Description: Current state of the generated image resource.
    Value: !GetAtt DoomMicrovmImage.State
  DoomLatestActiveImageVersion:
    Description: Latest active image version.
    Value: !GetAtt DoomMicrovmImage.LatestActiveImageVersion
  DoomImageBuildRoleArn:
    Description: IAM build role Lambda assumes while building the MicroVM image.
    Value: !GetAtt MicrovmImageBuildRole.Arn
  DoomImageLogGroupName:
    Description: CloudWatch log group for MicroVM image build logs.
    Value: !Ref MicrovmImageLogGroup
