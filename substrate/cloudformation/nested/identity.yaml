AWSTemplateFormatVersion: "2010-09-09"

Description: pairputer Cognito identity and OAuth clients.

Parameters:
  CodexCallbackUrl:
    Type: String
  CognitoDomainPrefix:
    Type: String
    AllowedPattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
  SuperAdminEmail:
    Type: String
    Default: ""
    Description: Optional email address for the first admin user. When set (and CreateSuperAdminUser=true, the default), the stack creates this user and Cognito emails them the branded temporary-password invite — a pure 1-click deploy with no CLI step. Leave blank for a bare deploy.
    AllowedPattern: '^$|^[^@]+@[^@]+\.[^@]+$'
  CreateSuperAdminUser:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Create the super-admin user in-stack (sends the branded invite email). The default true is what makes a console 1-click deploy log-in-ready. deploy.sh sets this false because it creates the admin itself (its headless path uses a Secrets Manager password instead of an emailed one).

Conditions:
  HasSuperAdminEmail: !Not [!Equals [!Ref SuperAdminEmail, ""]]
  # Create the in-stack admin only when an email is set AND the caller wants the template to own it.
  CreateAdminUser: !And
    - !Not [!Equals [!Ref SuperAdminEmail, ""]]
    - !Equals [!Ref CreateSuperAdminUser, "true"]

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-pool"
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      # Cognito's built-in email sender (COGNITO_DEFAULT): zero setup, ~50 emails/day, ideal for the
      # one-time admin invite. When the stack creates SuperAdminUser (CreateAdminUser condition — the
      # console 1-click default), Cognito generates a temporary password, emails THIS template, and puts
      # the account in FORCE_CHANGE_PASSWORD; the admin sets their own permanent password on first
      # hosted-UI login. No password is ever stored in CloudFormation or chosen by the operator.
      # (deploy.sh sets CreateSuperAdminUser=false and creates the admin itself — headless path stores a
      # Secrets Manager password; interactive path sends this same email.)
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "Your pairputer admin login"
          # HTML invite. Cognito substitutes {username} + {####} (temp password) ONLY — it cannot inject the
          # live McpEndpoint, so that stays a copy-from-Outputs step. Connection story: add the pairputer
          # connector in ChatGPT (web) and Claude (web) with the McpEndpoint URL; each covers that product's
          # web/desktop/mobile apps and Codex rides the ChatGPT connector. Claude's callbacks are pre-baked;
          # ChatGPT additionally needs its per-connector callback registered (docs/chatgpt.md).
          EmailMessage: |
            <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">Your pairputer admin login and the two connector links.</div>
            <div style="margin:0;padding:28px 12px;background:#fff8e8;font-family:'Nunito Sans',Nunito,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#111e46;">
            <div style="max-width:600px;margin:0 auto;background:#ffffff;border:1px solid #d8d1eb;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(17,30,70,0.10);">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;"><tr>
            <td width="34%" height="5" style="background:#ff7a3d;font-size:0;line-height:0;">&nbsp;</td>
            <td width="33%" height="5" style="background:#ffd84a;font-size:0;line-height:0;">&nbsp;</td>
            <td width="33%" height="5" style="background:#2cbdeb;font-size:0;line-height:0;">&nbsp;</td>
            </tr></table>
            <div style="padding:30px 30px 20px;background:#f4efff;border-bottom:1px solid #d8d1eb;text-align:center;">
            <img src="https://pairputer-launch.s3.amazonaws.com/third-party/brand/pairputer-logo-light.png" alt="pairputer" width="230" style="display:block;margin:0 auto;width:230px;max-width:70%;height:auto;border:0;outline:none;" />
            </div>
            <div style="padding:26px 30px 6px;">
            <div style="font-size:22px;font-weight:800;color:#111e46;">Your admin access is ready</div>
            <div style="font-size:14px;color:#56617d;margin-top:8px;line-height:1.6;">You deployed pairputer and set <b style="color:#111e46;"><span style="color:#111e46;text-decoration:none;">&#8204;{username}&#8204;</span></b> as the first super-admin. Here's your temporary password, then two quick connections.</div>
            </div>
            <div style="padding:16px 30px 4px;">
            <div style="background:#f4efff;border:1px solid #d8d1eb;border-radius:8px;padding:18px 20px;">
            <div style="font-size:11px;color:#56617d;text-transform:uppercase;letter-spacing:.09em;font-weight:700;">Username</div>
            <div style="font-size:15px;font-weight:600;margin:4px 0 14px;color:#111e46;font-family:'Space Mono',ui-monospace,Menlo,monospace;"><span style="color:#111e46;text-decoration:none;">&#8204;{username}&#8204;</span></div>
            <div style="font-size:11px;color:#56617d;text-transform:uppercase;letter-spacing:.09em;font-weight:700;">Temporary password</div>
            <div style="font-size:20px;font-weight:700;margin-top:4px;color:#7653e6;font-family:'Space Mono',ui-monospace,Menlo,monospace;">{####}</div>
            <div style="font-size:12px;color:#56617d;margin-top:10px;line-height:1.5;">Single-use. You'll set your own permanent password on first login.</div>
            </div></div>
            <div style="padding:20px 30px 8px;">
            <div style="font-size:16px;font-weight:800;color:#111e46;">Connect your AI apps</div>
            <div style="font-size:13px;color:#56617d;margin-top:6px;line-height:1.6;">Two connectors cover web, desktop, and mobile. Follow the setup guide for each &mdash; everything you need to paste comes from your CloudFormation stack's <b style="color:#111e46;">Outputs</b> tab.</div>
            <div style="font-size:15px;line-height:2;margin-top:12px;"><a href="https://github.com/somoore/pairputer-on-aws/blob/main/docs/chatgpt.md" style="color:#7653e6;font-weight:700;text-decoration:none;">Set up ChatGPT &rarr;</a></div>
            <div style="font-size:15px;line-height:2;"><a href="https://github.com/somoore/pairputer-on-aws/blob/main/docs/claude.md" style="color:#7653e6;font-weight:700;text-decoration:none;">Set up Claude &rarr;</a></div>
            <div style="font-size:12px;color:#56617d;margin-top:8px;line-height:1.5;">Each covers web, desktop, and mobile &middot; Codex rides the ChatGPT connector.</div>
            </div>
            <div style="padding:14px 30px 10px;"><div style="font-size:14px;color:#111e46;line-height:1.6;background:#fff8e8;border:1px solid #d8d1eb;border-radius:8px;padding:14px 18px;">&#128421;&#65039; Once connected, ask your AI to open the <b>Pairputer Workbench</b>. A shared Linux desktop streams straight into your chat, and you and the model drive the same live machine.</div></div>
            <div style="padding:16px 30px 24px;border-top:1px solid #d8d1eb;margin-top:10px;"><div style="font-size:12px;color:#56617d;line-height:1.6;">You're receiving this because your email was set as the pairputer super-admin during a CloudFormation deploy in your AWS account. If you didn't deploy pairputer, you can ignore this. The account lives only in your AWS account and no password works until it's changed on first login.</div></div>
            </div>
            <div style="max-width:600px;margin:14px auto 0;text-align:center;font-size:11px;color:#56617d;">pairputer &middot; a computer you and your AI share</div>
            </div>
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true

  ResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref UserPool
      Identifier: pairputer-mcp
      Name: pairputer MCP API
      Scopes:
        - ScopeName: invoke
          ScopeDescription: Invoke the pairputer MCP server

  SuperAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: SuperAdmins
      Description: First administrator group for this pairputer deployment.

  # Create the super-admin AT DEPLOY TIME so a pure console 1-click "just works": creating a
  # UserPoolUser without MessageAction:SUPPRESS makes Cognito send the pool's InviteMessageTemplate
  # (the branded email above) with {username}+{####}, and lands the account in FORCE_CHANGE_PASSWORD.
  # No CLI step. Conditional on HasSuperAdminEmail — an empty email skips this (bare deploy, no admin).
  # (deploy.sh still uses --message-action SUPPRESS + Secrets Manager for its HEADLESS path; that path
  # sets PAIRPUTER_SKIP_ADMIN_CREATE-equivalent by leaving SuperAdminEmail empty here is NOT how it
  # works — deploy.sh passes the email, so guard against a double-create: see DeletionPolicy note.)
  SuperAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Condition: CreateAdminUser
    # Retain: if the stack is torn down and redeployed with the same email, don't fight an existing user.
    DeletionPolicy: Retain
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref SuperAdminEmail
      DesiredDeliveryMediums: [EMAIL]
      UserAttributes:
        - Name: email
          Value: !Ref SuperAdminEmail
        - Name: email_verified
          Value: "true"

  SuperAdminUserInGroup:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Condition: CreateAdminUser
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: !Ref SuperAdminGroup
      Username: !Ref SuperAdminUser

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Ref CognitoDomainPrefix
      ManagedLoginVersion: 1

  CognitoWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-cognito-web-acl"
      Scope: REGIONAL
      Description: pairputer Cognito hosted UI protection
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-cognito-web-acl"
        SampledRequestsEnabled: true
      Rules:
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: cognito-ip-reputation
            SampledRequestsEnabled: true
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: cognito-known-bad-inputs
            SampledRequestsEnabled: true
        - Name: CognitoPerIpRateLimit
          Priority: 10
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 300
              AggregateKeyType: IP
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: cognito-per-ip-rate-limit
            SampledRequestsEnabled: true

  CognitoWafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt UserPool.Arn
      WebACLArn: !GetAtt CognitoWebAcl.Arn

  M2MClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: !Sub "${AWS::StackName}-m2m"
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [client_credentials]
      AllowedOAuthScopes: ["pairputer-mcp/invoke"]
      AccessTokenValidity: 24
      TokenValidityUnits:
        AccessToken: hours

  CodexClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: !Sub "${AWS::StackName}-codex"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, "pairputer-mcp/invoke"]
      CallbackURLs: [!Ref CodexCallbackUrl]
      SupportedIdentityProviders: [COGNITO]
      ExplicitAuthFlows: [ALLOW_REFRESH_TOKEN_AUTH, ALLOW_USER_SRP_AUTH]
      AccessTokenValidity: 8
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

  # One Cognito app client PER HOST (platform.md audit table): same pool, same resource server, one
  # client_id per chat host so the MCP server can resolve the caller's host profile from the JWT.
  # ChatGPT's real redirect URI is per-connector-instance (https://chatgpt.com/connector/oauth/<id>,
  # shown at connector creation) — wire-chatgpt.sh registers it post-deploy, exactly like wire-codex.sh
  # registers Codex's computed callback. The legacy static URL below keeps the client deployable and
  # covers already-published apps.
  ChatGPTClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: !Sub "${AWS::StackName}-chatgpt"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      # ChatGPT's connect flow requests every scope Cognito's discovery advertises (openid email
      # phone profile); a client that disallows any of them gets an instant invalid_scope bounce
      # (empirically hit 2026-07-08). Allow the standard OIDC set + our invoke scope.
      AllowedOAuthScopes: [openid, email, phone, profile, "pairputer-mcp/invoke"]
      CallbackURLs: ["https://chatgpt.com/connector_platform_oauth_redirect"]
      SupportedIdentityProviders: [COGNITO]
      ExplicitAuthFlows: [ALLOW_REFRESH_TOKEN_AUTH, ALLOW_USER_SRP_AUTH]
      AccessTokenValidity: 8
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

  # Claude web/desktop/mobile all redirect to fixed, documented URLs — fully static, no post-deploy step.
  ClaudeClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: !Sub "${AWS::StackName}-claude"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      # Same wall as ChatGPT (empirically hit 2026-07-09): the host's connect flow requests every
      # scope Cognito's discovery advertises; disallowing any = instant invalid_scope bounce
      # ("Authorization with pairputer failed" toast, no login page). Allow the standard OIDC set.
      AllowedOAuthScopes: [openid, email, phone, profile, "pairputer-mcp/invoke"]
      CallbackURLs:
        - "https://claude.ai/api/mcp/auth_callback"
        - "https://claude.com/api/mcp/auth_callback"
      SupportedIdentityProviders: [COGNITO]
      ExplicitAuthFlows: [ALLOW_REFRESH_TOKEN_AUTH, ALLOW_USER_SRP_AUTH]
      AccessTokenValidity: 8
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  M2MClientId:
    Value: !Ref M2MClient
  CodexClientId:
    Value: !Ref CodexClient
  ChatGPTClientId:
    Value: !Ref ChatGPTClient
  ClaudeClientId:
    Value: !Ref ClaudeClient
  CognitoDomain:
    Value: !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
  DiscoveryUrl:
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}/.well-known/openid-configuration"
  TokenEndpoint:
    Value: !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/token"
  M2MScope:
    Value: pairputer-mcp/invoke
  GetSecretCommand:
    Value: !Sub "aws cognito-idp describe-user-pool-client --user-pool-id ${UserPool} --client-id ${M2MClient} --region ${AWS::Region} --query 'UserPoolClient.ClientSecret' --output text"
  SuperAdminEmail:
    Value: !If [HasSuperAdminEmail, !Ref SuperAdminEmail, "not configured"]
  CreateSuperAdminCommand:
    Value: !If
      - HasSuperAdminEmail
      - !Sub >
          read -rsp 'Temporary password: ' PAIRPUTER_TEMP_PASSWORD; echo;
          aws cognito-idp admin-create-user --user-pool-id ${UserPool}
          --username '${SuperAdminEmail}'
          --user-attributes Name=email,Value='${SuperAdminEmail}' Name=email_verified,Value=true
          --temporary-password "$PAIRPUTER_TEMP_PASSWORD"
          --message-action SUPPRESS
          --region ${AWS::Region};
          unset PAIRPUTER_TEMP_PASSWORD
      - "Set SuperAdminEmail, redeploy, then use this output."
  CreateSuperAdminWithoutPasswordCommand:
    Value: !If
      - HasSuperAdminEmail
      - !Sub >
          aws cognito-idp admin-create-user --user-pool-id ${UserPool}
          --username '${SuperAdminEmail}'
          --user-attributes Name=email,Value='${SuperAdminEmail}' Name=email_verified,Value=true
          --message-action SUPPRESS
          --region ${AWS::Region}
      - "Set SuperAdminEmail, redeploy, then use this output."
  SetSuperAdminPermanentPasswordCommand:
    Value: !If
      - HasSuperAdminEmail
      - !Sub >
          read -rsp 'Permanent password: ' PAIRPUTER_PERMANENT_PASSWORD; echo;
          aws cognito-idp admin-set-user-password --user-pool-id ${UserPool}
          --username '${SuperAdminEmail}'
          --password "$PAIRPUTER_PERMANENT_PASSWORD"
          --permanent
          --region ${AWS::Region};
          unset PAIRPUTER_PERMANENT_PASSWORD
      - "Set SuperAdminEmail, redeploy, then use this output."
  AddSuperAdminToGroupCommand:
    Value: !If
      - HasSuperAdminEmail
      - !Sub "aws cognito-idp admin-add-user-to-group --user-pool-id ${UserPool} --username '${SuperAdminEmail}' --group-name ${SuperAdminGroup} --region ${AWS::Region}"
      - "Set SuperAdminEmail, redeploy, then use this output."
  LoginInstructions:
    Value: "Hosted UI self-sign-up is disabled. Create the configured super admin with the stack output command, then run codex mcp login pairputer."
  CognitoWebAclArn:
    Value: !GetAtt CognitoWebAcl.Arn
