AWSTemplateFormatVersion: "2010-09-09"

Description: >
  pairputer CI supply-chain stack. Deploy ONCE in the account that owns the public images. Creates:
  the GitHub Actions OIDC provider, a least-privilege push role assumable ONLY by this repo's main
  branch, and the two public ECR repos (immutable tags). GitHub Actions assumes the role via OIDC —
  no long-lived AWS keys are ever stored in GitHub. cosign keyless signing uses the same OIDC token.

Parameters:
  GitHubOrg:
    Type: String
    Default: somoore
  GitHubRepo:
    Type: String
    Default: pairputer-on-aws
  GitHubRef:
    Type: String
    Default: refs/heads/main
    Description: The only git ref allowed to assume the push role (least-privilege — not '*').
  GitHubOwnerId:
    Type: String
    Default: "59924790"
    Description: >-
      GitHub numeric owner id (github.com/somoore). Stable, rename-proof identity used in the OIDC
      trust instead of the mutable `sub` string. Find via: gh api repos/OWNER/REPO --jq .owner.id
  GitHubRepoId:
    Type: String
    Default: "1303487311"
    Description: >-
      GitHub numeric repository id (somoore/pairputer-on-aws). Find via: gh api repos/OWNER/REPO --jq .id
  LaunchBucketName:
    Type: String
    Default: pairputer-launch
    Description: Public launch bucket the publish-launch CI workflow writes the 1-click template + assets to.
  ThirdPartyMirrorBucket:
    Type: String
    Default: sympatry-launch-932930471665
    Description: >-
      Source bucket the FFmpeg mirror is copied FROM (read-only). publish-launch.sh copies
      third-party/ffmpeg/* out of here into the launch bucket so a fresh launch bucket is self-contained.
  McpRepoName:
    Type: String
    Default: pairputer-mcp
  RelayRepoName:
    Type: String
    Default: pairputer-stateful-relay
  CreateOidcProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Create the GitHub OIDC provider (set false if the account already has one).

Conditions:
  # Only create the OIDC provider if the account doesn't already have one (they're account-global).
  # Default true; set CreateOidcProvider=false if a GitHub OIDC provider already exists.
  ShouldCreateOidc: !Equals [!Ref CreateOidcProvider, "true"]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidc
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # AWS validates GitHub's OIDC via its trusted CAs; the thumbprint is no longer load-bearing,
      # but the field is still required by the resource. This is GitHub's well-known intermediate.
      ThumbprintList:
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # Least-privilege push role. Trust is scoped to EXACTLY this repo + ref (no wildcards, no pull_request,
  # no other branch). Permissions are limited to pushing to the two named public ECR repos.
  CiPushRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-push"
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOidc
                - !Ref GitHubOidcProvider
                - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                # audience must be sts (GitHub sets this when the workflow requests the token)
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                # Defense-in-depth: also require the STABLE numeric ids (rename-proof, exact).
                token.actions.githubusercontent.com:repository_owner_id: !Ref GitHubOwnerId
                token.actions.githubusercontent.com:repository_id: !Ref GitHubRepoId
              StringLike:
                # IAM REQUIRES a sub- (or job_workflow_ref-) scoped condition, so we must match `sub`.
                # This account emits sub with numeric suffixes: repo:<org>@<ownerId>/<repo>@<repoId>:...
                # so the plain "repo:org/repo:ref:..." never matched (the "Not authorized" failure).
                # Anchor on the exact numeric prefix + ref; wildcard tail keeps us robust to trailing
                # claim-format details. The numeric-id StringEquals conditions above are the real lock.
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}@${GitHubOwnerId}/${GitHubRepo}@${GitHubRepoId}:ref:${GitHubRef}*"
      Policies:
        - PolicyName: EcrPublicPushScoped
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Push layers/manifests to ONLY the two named public repos (+ cosign signature/attestation
              # artifacts, which live in the same repos). No wildcard repo access.
              - Sid: PushToNamedPublicRepos
                Effect: Allow
                Action:
                  - ecr-public:BatchCheckLayerAvailability
                  - ecr-public:InitiateLayerUpload
                  - ecr-public:UploadLayerPart
                  - ecr-public:CompleteLayerUpload
                  - ecr-public:PutImage
                  - ecr-public:DescribeImages
                  - ecr-public:DescribeRepositories
                  - ecr-public:BatchDeleteImage
                Resource:
                  - !GetAtt McpRepo.Arn
                  - !GetAtt RelayRepo.Arn
              # GetAuthorizationToken + the STS-token read for public ECR cannot be resource-scoped
              # (AWS requires "*"); they are read-only auth calls, not push. This is the minimum AWS allows.
              - Sid: PublicEcrAuth
                Effect: Allow
                Action:
                  - ecr-public:GetAuthorizationToken
                  - sts:GetServiceBearerToken
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:RequestedRegion: us-east-1   # ECR Public control plane is us-east-1 only
        # Publish the 1-click launch assets to the public launch bucket. This is what keeps the S3
        # 1-click template in lockstep with main (the publish-launch workflow assumes THIS role).
        # Scoped to the one launch bucket; read on the third-party mirror source for the FFmpeg copy.
        - PolicyName: LaunchPublishScoped
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteLaunchBucket
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:CreateBucket
                  - s3:PutBucketPublicAccessBlock
                Resource:
                  - !Sub "arn:aws:s3:::${LaunchBucketName}"
                  - !Sub "arn:aws:s3:::${LaunchBucketName}/*"
              - Sid: ReadThirdPartyMirrorSource
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ThirdPartyMirrorBucket}"
                  - !Sub "arn:aws:s3:::${ThirdPartyMirrorBucket}/*"

  McpRepo:
    Type: AWS::ECR::PublicRepository
    Properties:
      RepositoryName: !Ref McpRepoName

  RelayRepo:
    Type: AWS::ECR::PublicRepository
    Properties:
      RepositoryName: !Ref RelayRepoName

Outputs:
  PushRoleArn:
    Description: Role for GitHub Actions to assume via OIDC (role-to-assume in the workflow).
    Value: !GetAtt CiPushRole.Arn
  McpRepoUri:
    Description: Public ECR URI for the MCP server image (the registry alias appears once created).
    Value: !Sub "public.ecr.aws/<alias>/${McpRepoName}  (see 'aws ecr-public describe-registries' for alias)"
  RelayRepoName:
    Value: !Ref RelayRepoName
  McpRepoName:
    Value: !Ref McpRepoName
